/* Scroll cue */
.scroll-cue{
  position:absolute;
  bottom:max(20px, env(safe-area-inset-bottom, 0px) + 12px);
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  animation:scroll-bob 2s ease-in-out infinite;
  opacity:.4;
}
.scroll-cue span{
  display:block;
  width:1px;
  height:36px;
  background:linear-gradient(to bottom, transparent, #fff);
}
.scroll-cue::after{
  content:'';
  display:block;
  width:4px;height:4px;
  border-radius:50%;
  background:#fff;
}

/* Film grain */
body::after{
  content:'';
  position:fixed;inset:0;
  pointer-events:none;
  z-index:9000;
  opacity:.15;

/* Scan line */
.scan{

<script>
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!#$%&@';
const TARGET='NEW MUSIC';
const el=document.getElementById('nameEl');
function rnd(){return CHARS[Math.floor(Math.random()*CHARS.length)]}
function scrambleFull(){return TARGET.split('').map(c=>c===' '?' ':rnd()).join('')}
function runCycle(){
  const P1=20,P2=24;let f=0;
  function tick(){
    if(f<P1){el.textContent=scrambleFull()}
    else{const r=f-P1,res=Math.floor((r/P2)*TARGET.length);el.textContent=TARGET.split('').map((c,i)=>c===' '?' ':i<res?c:rnd()).join('')}
    f++;
    if(f<P1+P2)setTimeout(tick,48);
    else{el.textContent=TARGET;setTimeout(runCycle,7000)}

  }
  tick();
}
const observer=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){runCycle()}});
},{threshold:0.2});
observer.observe(document.querySelector('.page'));
setTimeout(runCycle,800);
</script>
